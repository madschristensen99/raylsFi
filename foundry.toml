[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
privacy_node = "${PRIVACY_NODE_RPC_URL}"
public_chain = "${PUBLIC_CHAIN_RPC_URL}"

[etherscan]
privacy_node = { key = "none", url = "https://blockscout-privacy-node-2.rayls.com/api" }
public_chain = { key = "none", url = "https://testnet-explorer.rayls.com/api" }
